# oapi-codegen v2 configuration for the tgwebdav Management API.
# Generates Go types and a net/http (std) server interface into package `api`.
# Regenerate with:
#   go run github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.4.1 \
#     -config internal/management/oapi.yaml api/openapi.yaml
package: api
output: internal/management/api/api.gen.go
generate:
  models: true
  std-http-server: true
  # NOTE: embedded-spec (GetSwagger) is intentionally NOT generated. It pulls in
  # github.com/getkin/kin-openapi, which is not part of this module's dependency
  # set. The raw spec (api/openapi.yaml) is instead embedded via go:embed in
  # api/openapi.go (package openapi) and served at GET /openapi.yaml.
output-options:
  skip-prune: true
