# oapi-codegen v2 configuration for the tgwebdav Management API.
# Generates Go types, a net/http (std) server interface, and the embedded
# OpenAPI spec into package `api`.
package: api
output: internal/management/api/api.gen.go
generate:
  models: true
  std-http-server: true
  # NOTE: embedded-spec (GetSwagger) is intentionally NOT generated. It pulls in
  # github.com/getkin/kin-openapi, which is not part of this module's dependency
  # set, and adding it would require editing go.mod/go.sum (forbidden). The raw
  # spec is embedded separately via go:embed in spec.go and served at /openapi.yaml.
output-options:
  skip-prune: true
