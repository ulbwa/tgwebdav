# oapi-codegen v2 configuration for the tgwebdav Management API.
# Generates Go types and a net/http (std) server interface into package `management`.
# Regenerate with:
#   go run github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.4.1 \
#     -config api/openapi/config.yaml api/openapi/management.yaml
package: management
output: pkg/openapi/management/server.gen.go
generate:
  models: true
  std-http-server: true
  # NOTE: embedded-spec (GetSwagger) is intentionally NOT generated. It pulls in
  # github.com/getkin/kin-openapi, which is not part of this module's dependency
  # set. The raw spec (api/openapi/management.yaml) is instead embedded via go:embed in
  # api/openapi/spec.go (package openapi) and served at GET /openapi.yaml.
output-options:
  skip-prune: true
