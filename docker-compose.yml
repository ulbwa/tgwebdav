services:
  postgres:
    image: postgres:17-alpine
    container_name: tgwebdav-postgres
    environment:
      POSTGRES_USER: tgwebdav
      POSTGRES_PASSWORD: tgwebdav
      POSTGRES_DB: tgwebdav
    ports:
      - "5433:5432"
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tgwebdav -d tgwebdav"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - tgwebdav_pgdata:/var/lib/postgresql/data

volumes:
  tgwebdav_pgdata:
