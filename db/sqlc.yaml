version: "2"
sql:
  - engine: "postgresql"
    queries: "query"
    schema: "schema.sql"
    gen:
      go:
        package: "sqlc"
        out: "../internal/repository/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: false
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
